name: Check upstream updates

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check upstream commits
        id: upstream
        shell: bash
        run: |
          git remote add upstream https://github.com/bensema/gotdx.git
          git fetch upstream main

          count="$(git rev-list --count HEAD..upstream/main)"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          if [ "$count" -gt 0 ]; then
            {
              echo "commits<<EOF"
              git log --oneline --max-count=20 HEAD..upstream/main
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update reminder issue
        if: steps.upstream.outputs.count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const count = Number('${{ steps.upstream.outputs.count }}')
            const commits = `${{ steps.upstream.outputs.commits }}`
            const title = 'Upstream gotdx has new updates'
            const body = [
              `原项目 bensema/gotdx 的 main 分支当前领先本仓库 main 分支 ${count} 个提交。`,
              '',
              '最近提交：',
              '```',
              commits || '(no commit details)',
              '```',
              '',
              '本地同步命令：',
              '```bash',
              'git checkout main',
              'git fetch upstream',
              'git merge upstream/main',
              'git push origin main',
              '```',
              '',
              '如果合并有冲突，解决冲突后执行：',
              '```bash',
              'git add .',
              'git commit',
              'git push origin main',
              '```',
            ].join('\n')

            const { owner, repo } = context.repo
            const label = 'upstream-update'

            try {
              await github.rest.issues.getLabel({ owner, repo, name: label })
            } catch (error) {
              if (error.status !== 404) throw error
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: '0969da',
                description: 'Reminder to merge updates from bensema/gotdx',
              })
            }

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 20,
            })

            const existing = issues.data.find(issue => issue.title === title)

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body,
              })
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label],
              })
            }
