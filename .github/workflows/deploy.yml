name: Build and Publish Gotdx

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}
  STOCK_REPOSITORY: dengsong666/stock-mood

concurrency:
  group: gotdx-production-publish
  cancel-in-progress: false

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT || secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify stock deployment
        env:
          TOKEN: ${{ secrets.STOCK_DEPLOY_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$TOKEN" || {
            echo "::error::缺少 STOCK_DEPLOY_DISPATCH_TOKEN"
            exit 1
          }

          # 由统一部署仓库构建清单，服务器主动拉取并部署。
          curl --fail-with-body --request POST \
            --url "https://api.github.com/repos/${STOCK_REPOSITORY}/dispatches" \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            --data "$(cat <<JSON
          {
            "event_type": "stock-deploy",
            "client_payload": {
              "source_repository": "gotdx",
              "source_ref": "${GITHUB_REF_NAME}",
              "source_sha": "${GITHUB_SHA}",
              "web_ref": "main",
              "server_ref": "main",
              "adata_ref": "main",
              "tdx_ref": "${GITHUB_SHA}"
            }
          }
          JSON
          )"
